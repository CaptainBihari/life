<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyFlix • Your Personal Streaming</title>
  
  <!-- Google Fonts - Netflix-like font -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    :root {
      --netflix-red: #e50914;
      --netflix-black: #141414;
      --netflix-dark: #221f1f;
      --text-light: #e5e5e5;
      --text-muted: #b3b3b3;
      --card-bg: #2f2f2f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--netflix-black);
      color: var(--text-light);
      font-family: 'Roboto', sans-serif;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* Navbar */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 1.2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
      transition: background 0.4s;
    }

    nav.scrolled {
      background: var(--netflix-black);
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }

    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 3.2rem;
      color: var(--netflix-red);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .logo i {
      font-size: 2.4rem;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin: 0 1.4rem;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--netflix-red);
    }

    .right-nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    #searchInput {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 0.7rem 1rem 0.7rem 2.8rem;
      border-radius: 30px;
      width: 220px;
      transition: all 0.3s;
    }

    #searchInput:focus {
      width: 300px;
      background: rgba(255,255,255,0.12);
      border-color: var(--netflix-red);
      outline: none;
    }

    .upload-btn {
      background: var(--netflix-red);
      color: white;
      border: none;
      padding: 0.7rem 1.6rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .upload-btn:hover {
      background: #f40612;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(229,9,20,0.4);
    }

    /* Hero */
    #hero {
      height: 95vh;
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding-bottom: 12%;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--netflix-black) 10%, transparent 50%, rgba(20,20,20,0.4) 100%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 700px;
      margin-left: 4rem;
    }

    .hero-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 5.5rem;
      line-height: 0.9;
      margin-bottom: 1rem;
      text-shadow: 3px 3px 12px black;
    }

    .hero-desc {
      font-size: 1.3rem;
      max-width: 90%;
      margin-bottom: 2rem;
      color: var(--text-muted);
    }

    .hero-buttons button {
      padding: 0.9rem 2.2rem;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 1rem;
      transition: all 0.3s;
    }

    .play-btn {
      background: white;
      color: black;
    }

    .play-btn:hover {
      background: #e6e6e6;
    }

    .info-btn {
      background: rgba(109,109,110,0.7);
      color: white;
    }

    .info-btn:hover {
      background: rgba(109,109,110,0.9);
    }

    /* Sections */
    section {
      padding: 3rem 4rem;
    }

    h2 {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.6rem;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
    }

    .row {
      display: flex;
      gap: 1.2rem;
      overflow-x: auto;
      padding-bottom: 2rem;
      scroll-behavior: smooth;
    }

    .row::-webkit-scrollbar {
      height: 8px;
    }

    .row::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 10px;
    }

    .card {
      flex: 0 0 220px;
      position: relative;
      cursor: pointer;
      transition: all 0.35s ease;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.5);
    }

    .card:hover {
      transform: scale(1.12) translateY(-12px);
      z-index: 10;
      box-shadow: 0 20px 40px rgba(229,9,20,0.3);
    }

    .card img {
      width: 100%;
      height: 124px;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 0.9rem;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
    }

    .card-title {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
    }

    .card-type {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Modal */
    #mediaModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--netflix-dark);
      border-radius: 14px;
      width: 90%;
      max-width: 1100px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
      position: relative;
    }

    .modal-media {
      width: 100%;
      aspect-ratio: 16/9;
      background: black;
    }

    .modal-media img, .modal-media video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .modal-info {
      padding: 2.5rem;
    }

    .close-modal {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      font-size: 2.5rem;
      color: white;
      cursor: pointer;
      z-index: 10;
      background: rgba(0,0,0,0.5);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .close-modal:hover {
      background: var(--netflix-red);
    }

    /* Upload Modal */
    #uploadModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .upload-box {
      background: var(--netflix-dark);
      border-radius: 16px;
      width: 90%;
      max-width: 580px;
      padding: 2.5rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8);
    }

    .upload-box h2 {
      text-align: center;
      margin-bottom: 2rem;
    }

    input, textarea {
      width: 100%;
      padding: 1rem;
      margin: 0.8rem 0;
      background: #333;
      border: 1px solid #555;
      color: white;
      border-radius: 8px;
      font-size: 1rem;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--netflix-red);
    }

    .file-drop {
      border: 3px dashed #555;
      border-radius: 12px;
      padding: 3rem;
      text-align: center;
      margin: 1.5rem 0;
      cursor: pointer;
      transition: all 0.3s;
    }

    .file-drop:hover {
      border-color: var(--netflix-red);
      background: rgba(229,9,20,0.08);
    }

    /* Floating upload button */
    #floatUpload {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--netflix-red);
      color: white;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 10px 30px rgba(229,9,20,0.5);
      cursor: pointer;
      z-index: 500;
      transition: all 0.3s;
    }

    #floatUpload:hover {
      transform: scale(1.15);
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .hero-content { margin-left: 1.5rem; }
      .hero-title { font-size: 4rem; }
      section { padding: 2rem 1.5rem; }
      .card { flex: 0 0 160px; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar">
    <div class="logo">
      <i class="fas fa-film"></i>
      MyFlix
    </div>

    <div class="nav-links">
      <a href="#" onclick="showSection('home')">Home</a>
      <a href="#" onclick="showSection('photos')">Photos</a>
      <a href="#" onclick="showSection('videos')">Videos</a>
    </div>

    <div class="right-nav">
      <div style="position:relative;">
        <i class="fas fa-search" style="position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:#aaa;"></i>
        <input id="searchInput" type="text" placeholder="Search titles..." onkeyup="filterMedia()">
      </div>
      <button class="upload-btn" onclick="openUploadModal()">Upload</button>
    </div>
  </nav>

  <!-- Hero -->
  <header id="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title" id="heroTitle"></h1>
      <p class="hero-desc" id="heroDesc"></p>
      <div class="hero-buttons">
        <button class="play-btn" onclick="playFeatured()"><i class="fas fa-play"></i> Play</button>
        <button class="info-btn" onclick="openModal(currentFeatured)">More Info</button>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main>
    <section id="allSection">
      <h2>All Media</h2>
      <div id="allRow" class="row"></div>
    </section>

    <section id="photosSection">
      <h2>Photos</h2>
      <div id="photosRow" class="row"></div>
    </section>

    <section id="videosSection">
      <h2>Videos</h2>
      <div id="videosRow" class="row"></div>
    </section>
  </main>

  <!-- Media Modal -->
  <div id="mediaModal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <div class="modal-media" id="modalMedia"></div>
      <div class="modal-info">
        <h1 id="modalTitle" style="font-family:'Bebas Neue'; font-size:3.2rem; margin-bottom:1rem;"></h1>
        <p id="modalDesc" style="font-size:1.2rem; color:#ccc;"></p>
      </div>
    </div>
  </div>

  <!-- Upload Modal -->
  <div id="uploadModal">
    <div class="upload-box">
      <h2>Upload New Media</h2>
      <form id="uploadForm" onsubmit="handleUpload(event)">
        <input id="uploadTitle" type="text" placeholder="Title" required/>
        <textarea id="uploadDesc" placeholder="Description" rows="4" required></textarea>

        <div class="file-drop" id="dropZone">
          <i class="fas fa-cloud-upload-alt" style="font-size:3.5rem; color:#777; margin-bottom:1rem;"></i>
          <p>Drag & drop or click to select photo/video</p>
          <input type="file" id="fileInput" accept="image/*,video/*" hidden required/>
        </div>

        <button type="submit" class="upload-btn" style="width:100%; padding:1.2rem; font-size:1.2rem;">
          <i class="fas fa-upload"></i> Upload
        </button>
      </form>
    </div>
  </div>

  <!-- Floating Upload -->
  <div id="floatUpload" onclick="openUploadModal()">
    <i class="fas fa-plus"></i>
  </div>

  <script>
    // ──────────────────────────────────────────────
    // Data
    // ──────────────────────────────────────────────
    let mediaLibrary = [];
    let currentFeatured = null;
    let currentModalMedia = null;

    

    // ──────────────────────────────────────────────
    // Local Storage
    // ──────────────────────────────────────────────
    function loadMedia() {
      const saved = localStorage.getItem('myFlixMedia');
      mediaLibrary = saved ? JSON.parse(saved) : [...initialMedia];
      renderAll();
      pickFeatured();
    }

    function saveMedia() {
      localStorage.setItem('myFlixMedia', JSON.stringify(mediaLibrary));
    }

    // ──────────────────────────────────────────────
    // Render
    // ──────────────────────────────────────────────
    function createCard(media) {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <img src="${media.thumb}" alt="${media.title}">
        <div class="card-info">
          <div class="card-title">${media.title}</div>
          <div class="card-type">${media.type.toUpperCase()}</div>
        </div>
      `;
      div.onclick = () => openModal(media);
      return div;
    }

    function renderRow(id, items) {
      const container = document.getElementById(id);
      container.innerHTML = '';
      items.forEach(m => container.appendChild(createCard(m)));
    }

    function renderAll() {
      renderRow('allRow', mediaLibrary);
      renderRow('photosRow', mediaLibrary.filter(m => m.type==='photo'));
      renderRow('videosRow', mediaLibrary.filter(m => m.type==='video'));
    }

    function pickFeatured() {
      if (!mediaLibrary.length) return;
      currentFeatured = mediaLibrary[Math.floor(Math.random()*mediaLibrary.length)];
      document.getElementById('hero').style.backgroundImage = `url('${currentFeatured.thumb}')`;
      document.getElementById('heroTitle').textContent = currentFeatured.title;
      document.getElementById('heroDesc').textContent = currentFeatured.desc;
    }

    function playFeatured() {
      if (currentFeatured) openModal(currentFeatured);
    }

    // ──────────────────────────────────────────────
    // Modal
    // ──────────────────────────────────────────────
    function openModal(media) {
      currentModalMedia = media;
      const cont = document.getElementById('modalMedia');
      cont.innerHTML = media.type==='photo'
        ? `<img src="${media.url}" alt="${media.title}">`
        : `<video src="${media.url}" controls autoplay></video>`;

      document.getElementById('modalTitle').textContent = media.title;
      document.getElementById('modalDesc').textContent = media.desc;

      document.getElementById('mediaModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('mediaModal').style.display = 'none';
      const vid = document.querySelector('#modalMedia video');
      if (vid) vid.pause();
    }

    // ──────────────────────────────────────────────
    // Upload
    // ──────────────────────────────────────────────
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.onclick = () => fileInput.click();

    ['dragover','dragenter'].forEach(e => dropZone.addEventListener(e, e=> {
      e.preventDefault(); dropZone.style.borderColor = 'var(--netflix-red)';
    }));

    ['dragleave','drop'].forEach(e => dropZone.addEventListener(e, e=> {
      e.preventDefault(); dropZone.style.borderColor = '#555';
    }));

    dropZone.addEventListener('drop', e => {
      fileInput.files = e.dataTransfer.files;
    });

    async function handleUpload(e) {
      e.preventDefault();
      const title = document.getElementById('uploadTitle').value.trim();
      const desc  = document.getElementById('uploadDesc').value.trim();
      const file  = fileInput.files[0];
      if (!file || !title || !desc) return alert('Please fill everything');

      const reader = new FileReader();
      reader.onload = async ev => {
        let thumb = ev.target.result;
        if (file.type.startsWith('video/')) {
          thumb = await getVideoThumb(ev.target.result);
        }

        const newItem = {
          id: Date.now(),
          title, desc,
          type: file.type.startsWith('video/') ? 'video' : 'photo',
          url: ev.target.result,
          thumb
        };

        mediaLibrary.unshift(newItem);
        saveMedia();
        renderAll();
        pickFeatured();
        closeUploadModal();
        alert('Uploaded! 🎉');
      };
      reader.readAsDataURL(file);
    }

    function getVideoThumb(videoSrc) {
      return new Promise(resolve => {
        const vid = document.createElement('video');
        vid.src = videoSrc;
        vid.muted = true;
        vid.onloadeddata = () => vid.currentTime = 1;
        vid.onseeked = () => {
          const can = document.createElement('canvas');
          can.width = 400; can.height = 225;
          can.getContext('2d').drawImage(vid,0,0,can.width,can.height);
          resolve(can.toDataURL('image/jpeg',0.8));
        };
      });
    }

    function openUploadModal() {
      document.getElementById('uploadModal').style.display = 'flex';
      document.getElementById('uploadForm').reset();
    }

    function closeUploadModal() {
      document.getElementById('uploadModal').style.display = 'none';
    }

    // ──────────────────────────────────────────────
    // Search & Scroll navbar
    // ──────────────────────────────────────────────
    function filterMedia() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!q) return renderAll();

      const filtered = mediaLibrary.filter(m =>
        m.title.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q)
      );

      document.getElementById('allRow').innerHTML = '';
      if (!filtered.length) {
        document.getElementById('allRow').innerHTML = '<p style="color:#888; padding:3rem; text-align:center;">No results found</p>';
        return;
      }
      filtered.forEach(m => document.getElementById('allRow').appendChild(createCard(m)));
    }

    function showSection(id) {
      document.getElementById(id + 'Section').scrollIntoView({behavior:'smooth'});
    }

    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 100);
    });

    // Init
    loadMedia();
    document.addEventListener('click', e => {
      if (e.target.id === 'mediaModal') closeModal();
      if (e.target.id === 'uploadModal') closeUploadModal();
    });
  </script>
</body>
</html>
